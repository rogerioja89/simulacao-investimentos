# App (dev/prod) com SQLite em arquivo
quarkus.datasource.db-kind=sqlite
quarkus.datasource.jdbc.url=jdbc:sqlite:./data/investimentos.db
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Testes com H2 em memˇria (isolados e rßpidos)
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:investimentos;DB_CLOSE_DELAY=-1
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
